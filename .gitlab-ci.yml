# =====================================================================
#  GitLab CI/CD — eLearning (IOMAD / Moodle, PHP/Apache image)
#
#  We only DEPLOY a third-party app (IOMAD/Moodle); we do not maintain its
#  source code. So no source/secret scan and no image CVE scan here — we just
#  build and publish the deployment image.
#
#  Role split:
#    - GitHub : mirrors the code to GitLab (mirror.yml). Nothing else.
#    - GitLab : BUILD/PUSH of the Docker image (PROD: main and tags).
#
#  Triggered by the GitHub -> GitLab mirror.
#
#  Prerequisites on the GitLab project:
#    - Container Registry enabled (Settings > General > Visibility).
#    - A runner that supports Docker-in-Docker (privileged).
#    - Variables provided AUTOMATICALLY by GitLab (nothing to create):
#        CI_REGISTRY, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD, CI_REGISTRY_IMAGE
# =====================================================================

stages:
  - build

# Build the production image only on main and tags.
# Other refs (e.g. dev) are just mirrored, no pipeline.
workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "main"'

build_image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    - if: '$CI_COMMIT_TAG'
      variables:
        IMAGE_TAG: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH == "main"'
      variables:
        IMAGE_TAG: "latest"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # readable tag (latest / vX.Y.Z) + immutable tag (short SHA)
    - docker build -t "$CI_REGISTRY_IMAGE:$IMAGE_TAG" -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
